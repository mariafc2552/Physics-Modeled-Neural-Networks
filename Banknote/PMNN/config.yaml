paths:
  srcdir: C:\Users\maria\Desktop\Articulos_version_Sept\Banknote\Data\Banknote
  datadir: C:\Users\maria\Desktop\Articulos_version_Sept\Banknote\Data\model_data
  model: pmnn.pt
